<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Loja de Kits Solares</title>
  <link rel="stylesheet" href="./css/loja.css ">
 </head>
<body>
  <section class="loja">
    <h2>Kits de Sistema Solar</h2>
    <div class="carrossel">
      <button class="anterior">&#10094;</button>
      <div class="slider2">
        <!-- Slides serão inseridos aqui pelo JavaScript -->
      </div>
      <button class="proximo">&#10095;</button>
    </div>
    <div class="cupom">
      <label for="codigo-cupom">Digite seu cupom de desconto:</label>
      <input type="text" id="codigo-cupom" placeholder="EXEMPLO10">
      <button id="aplicar-cupom">Aplicar</button>
      <p id="mensagem-cupom"></p>
    </div>
  </section>
  <script src="./js/loja.js"></script>
</body>
</html>
